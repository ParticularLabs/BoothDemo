name: Release
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - src/Billing/Billing.csproj
          - src/Shipping/Shipping.csproj
          - src/Sales/Sales.csproj
          - src/ClientUI/ClientUI.csproj
          - src/RabbitToAzureBridge/RabbitToAzureBridge.csproj
        runtime:
          - linux-x64
          - linux-arm64   # Raspberry Pi 4 (64-bit)
          # - linux-arm   # uncomment if you need 32-bit Pi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore "${{ matrix.project }}"

      - name: Publish
        run: |
          name=$(basename "${{ matrix.project }}" .csproj)

          dotnet publish "${{ matrix.project }}" \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -o "artifacts/${{ matrix.runtime }}/$name"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.runtime }}-${{ matrix.project }}
          path: artifacts/${{ matrix.runtime }}
